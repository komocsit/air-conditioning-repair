<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="6" x2="0" y2="59" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6d00"/>
      <stop offset="25%"  stop-color="#ffca28"/>
      <stop offset="58%"  stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0d5f9e"/>
    </linearGradient>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#05101a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cc">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1fc1f0" stroke-width="1.5" opacity="0.28"/>

  <g clip-path="url(#cc)">
    <!-- Lightning bolt: M 41,6 L 25,34 L 36,34 L 21,58 L 37,37 L 26,37 Z -->
    <path d="M 41,6 L 25,34 L 36,34 L 21,58 L 37,37 L 26,37 Z"
          fill="url(#boltGrad)" filter="url(#glow)"/>
    <path d="M 41,6 L 25,34 L 36,34 L 21,58 L 37,37 L 26,37 Z"
          fill="none" stroke="white" stroke-width="0.6" opacity="0.2"/>

    <!-- Sparks top-right -->
    <line x1="46" y1="11" x2="51" y2="7"  stroke="#ff9800" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="48" y1="18" x2="54" y2="16" stroke="#ffca28" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

    <!-- Ice crystals bottom-left -->
    <g transform="translate(13,47)" opacity="0.82">
      <line x1="0"  y1="-5" x2="0"  y2="5"  stroke="#29b6f6" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="-5" y1="0"  x2="5"  y2="0"  stroke="#29b6f6" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="-3" y1="-3" x2="3"  y2="3"  stroke="#29b6f6" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="3"  y1="-3" x2="-3" y2="3"  stroke="#29b6f6" stroke-width="0.9" stroke-linecap="round"/>
    </g>
    <g transform="translate(50,49)" opacity="0.55">
      <line x1="0"  y1="-3.5" x2="0"   y2="3.5" stroke="#29b6f6" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-3.5" y1="0"  x2="3.5"  y2="0"  stroke="#29b6f6" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#29b6f6" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="2.5"  y1="-2.5" x2="-2.5" y2="2.5" stroke="#29b6f6" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
