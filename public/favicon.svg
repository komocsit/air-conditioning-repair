<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1fc1f0"/>
      <stop offset="50%" stop-color="#0d7ebf"/>
      <stop offset="100%" stop-color="#085283"/>
    </linearGradient>
  </defs>

  <!-- Circle badge -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Snowflake arms (6-way, radius 22) -->
  <!-- UP -->
  <line x1="32" y1="32" x2="32" y2="10" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="32" y1="20" x2="27" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="20" x2="37" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- TOP-RIGHT (60°) -->
  <line x1="32" y1="32" x2="51" y2="21" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="44" y1="25" x2="46" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44" y1="25" x2="51" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- BOTTOM-RIGHT (120°) -->
  <line x1="32" y1="32" x2="51" y2="43" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="44" y1="39" x2="51" y2="37" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44" y1="39" x2="46" y2="46" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- DOWN -->
  <line x1="32" y1="32" x2="32" y2="54" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="27" y2="48" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="37" y2="48" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- BOTTOM-LEFT (240°) -->
  <line x1="32" y1="32" x2="13" y2="43" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="20" y1="39" x2="13" y2="37" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="39" x2="18" y2="46" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- TOP-LEFT (300°) -->
  <line x1="32" y1="32" x2="13" y2="21" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="13" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="18" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="5.5" fill="white"/>
  <circle cx="32" cy="32" r="3.5" fill="url(#bg)"/>
</svg>
