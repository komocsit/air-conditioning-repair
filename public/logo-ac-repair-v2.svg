<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 90" width="310" height="90">
  <defs>
    <!-- Warm → Cool bolt gradient mapped to actual y-coordinates -->
    <linearGradient id="boltGrad" x1="0" y1="8" x2="0" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff6d00"/>
      <stop offset="25%"  stop-color="#ffca28"/>
      <stop offset="58%"  stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0d5f9e"/>
    </linearGradient>
    <!-- Dark badge bg -->
    <radialGradient id="circleBg" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#05101a"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d94d6"/>
      <stop offset="100%" stop-color="#075f97"/>
    </linearGradient>
    <!-- Bolt glow -->
    <filter id="glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip content inside circle -->
    <clipPath id="cClip">
      <circle cx="45" cy="45" r="41"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <circle cx="45" cy="45" r="42" fill="url(#circleBg)"/>
  <circle cx="45" cy="45" r="42" fill="none" stroke="#1fc1f0" stroke-width="1.5" opacity="0.28"/>

  <g clip-path="url(#cClip)">
    <!-- Subtle hot/cold midline -->
    <line x1="5" y1="46" x2="85" y2="46" stroke="white" stroke-width="0.6" stroke-dasharray="3 5" opacity="0.1"/>

    <!-- Lightning bolt: warm top → cool bottom -->
    <path d="M 58,8 L 35,48 L 50,48 L 30,82 L 52,52 L 37,52 Z"
          fill="url(#boltGrad)" filter="url(#glow)"/>
    <!-- Bolt edge -->
    <path d="M 58,8 L 35,48 L 50,48 L 30,82 L 52,52 L 37,52 Z"
          fill="none" stroke="white" stroke-width="0.7" opacity="0.22"/>

    <!-- HOT sparks (upper-right of bolt) -->
    <line x1="63" y1="15" x2="70" y2="10" stroke="#ff9800" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
    <line x1="66" y1="25" x2="74" y2="22" stroke="#ffca28" stroke-width="1.4" stroke-linecap="round" opacity="0.70"/>
    <line x1="62" y1="33" x2="69" y2="31" stroke="#ffca28" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <circle cx="70" cy="16" r="1.3" fill="#ffca28" opacity="0.55"/>

    <!-- ICE crystals (lower-left + lower-right of bolt) -->
    <g transform="translate(20,65)" opacity="0.85">
      <line x1="0"  y1="-6" x2="0"  y2="6"  stroke="#29b6f6" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="-6" y1="0"  x2="6"  y2="0"  stroke="#29b6f6" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="-4" y1="-4" x2="4"  y2="4"  stroke="#29b6f6" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="4"  y1="-4" x2="-4" y2="4"  stroke="#29b6f6" stroke-width="1.1" stroke-linecap="round"/>
    </g>
    <g transform="translate(68,63)" opacity="0.62">
      <line x1="0"    y1="-4.5" x2="0"    y2="4.5" stroke="#29b6f6" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="-4.5" y1="0"    x2="4.5"  y2="0"   stroke="#29b6f6" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="-3"   y1="-3"   x2="3"    y2="3"   stroke="#29b6f6" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="3"    y1="-3"   x2="-3"   y2="3"   stroke="#29b6f6" stroke-width="0.9" stroke-linecap="round"/>
    </g>
    <!-- Floating ice dots -->
    <circle cx="14" cy="55" r="1.5" fill="#29b6f6" opacity="0.5"/>
    <circle cx="73" cy="74" r="1.2" fill="#29b6f6" opacity="0.4"/>
    <circle cx="23" cy="78" r="1"   fill="#29b6f6" opacity="0.35"/>
  </g>

  <!-- Highlight arc (glassy top-left) -->
  <path d="M 14,28 A 32,32 0 0 1 58,12"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.09" stroke-linecap="round"/>

  <!-- Vertical divider -->
  <line x1="100" y1="16" x2="100" y2="74" stroke="#0d7ebf" stroke-width="1.2" opacity="0.36"/>

  <!-- PROFESSIONAL label -->
  <text x="114" y="30"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#888" letter-spacing="3.5" font-weight="500">PROFESSIONAL</text>

  <!-- Main brand text -->
  <text x="111" y="57"
        font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
        font-size="30" font-weight="900"
        fill="url(#textGrad)" letter-spacing="1">AC REPAIR</text>

  <!-- Underline accent -->
  <rect x="113" y="61" width="185" height="1.5" rx="0.75" fill="url(#textGrad)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="114" y="75"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#777" letter-spacing="2.8">COOLING &amp; DIAGNOSTICS</text>
</svg>
