<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 90" width="310" height="90">
  <defs>
    <linearGradient id="badgeGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#1fc1f0"/>
      <stop offset="50%" stop-color="#0d7ebf"/>
      <stop offset="100%" stop-color="#085283"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d94d6"/>
      <stop offset="100%" stop-color="#075f97"/>
    </linearGradient>
  </defs>

  <!-- Floating snowflake particles (right side of badge) -->
  <g transform="translate(75, 19)" opacity="0.45">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#0d7ebf" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#0d7ebf" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#0d7ebf" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#0d7ebf" stroke-width="1.3" stroke-linecap="round"/>
  </g>
  <g transform="translate(83, 42)" opacity="0.28">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#0d7ebf" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#0d7ebf" stroke-width="1.1" stroke-linecap="round"/>
  </g>
  <g transform="translate(77, 64)" opacity="0.25">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#0d7ebf" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#0d7ebf" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#0d7ebf" stroke-width="1" stroke-linecap="round"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#0d7ebf" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Badge circle with gradient -->
  <circle cx="42" cy="45" r="40" fill="url(#badgeGrad)"/>
  <!-- Outer ring -->
  <circle cx="42" cy="45" r="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.22"/>
  <!-- Subtle highlight arc (top-left) -->
  <path d="M 16,26 A 32,32 0 0 1 56,13" fill="none" stroke="white" stroke-width="2" opacity="0.18" stroke-linecap="round"/>

  <!-- Snowflake centered at (42, 45), radius 30 -->
  <!-- Arm: UP -->
  <line x1="42" y1="45" x2="42" y2="15" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="42" y1="26" x2="35" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="26" x2="49" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Arm: TOP-RIGHT (60°) — end ≈ (68, 30) -->
  <line x1="42" y1="45" x2="68" y2="30" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="59" y1="35" x2="61" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="35" x2="67" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Arm: BOTTOM-RIGHT (120°) — end ≈ (68, 60) -->
  <line x1="42" y1="45" x2="68" y2="60" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="59" y1="55" x2="67" y2="52" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="55" x2="61" y2="63" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Arm: DOWN -->
  <line x1="42" y1="45" x2="42" y2="75" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="42" y1="64" x2="35" y2="69" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="64" x2="49" y2="69" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Arm: BOTTOM-LEFT (240°) — end ≈ (16, 60) -->
  <line x1="42" y1="45" x2="16" y2="60" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="25" y1="55" x2="17" y2="52" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="55" x2="23" y2="63" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Arm: TOP-LEFT (300°) — end ≈ (16, 30) -->
  <line x1="42" y1="45" x2="16" y2="30" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="25" y1="35" x2="17" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="35" x2="23" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Snowflake center dot -->
  <circle cx="42" cy="45" r="6.5" fill="white"/>
  <circle cx="42" cy="45" r="4" fill="url(#badgeGrad)"/>

  <!-- Vertical divider -->
  <line x1="97" y1="16" x2="97" y2="74" stroke="#0d7ebf" stroke-width="1.2" opacity="0.4"/>

  <!-- Small label above main text -->
  <text x="111" y="30"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#888"
        letter-spacing="3.5" font-weight="500">PROFESSIONAL</text>

  <!-- Primary brand text: AC REPAIR -->
  <text x="108" y="57"
        font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
        font-size="30" font-weight="900"
        fill="url(#textGrad)"
        letter-spacing="1">AC REPAIR</text>

  <!-- Accent underline -->
  <rect x="110" y="61" width="185" height="1.5" rx="0.75" fill="url(#textGrad)" opacity="0.45"/>

  <!-- Bottom tagline -->
  <text x="111" y="75"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" fill="#777"
        letter-spacing="2.8">COOLING &amp; DIAGNOSTICS</text>
</svg>
